<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>✿ Kawaii Calculator ✿</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ─────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.4s ease;
    }

    /* ─── Light Mode Background ─────────────────────────────── */
    body.light {
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e3f2fd 100%);
    }

    /* ─── Dark Mode Background ──────────────────────────────── */
    body.dark {
      background: linear-gradient(135deg, #2d1b26 0%, #1e1b2e 50%, #1a2035 100%);
    }

    /* ─── Page Wrapper ──────────────────────────────────────── */
    .page-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    /* ─── Decorative Header ─────────────────────────────────── */
    .deco {
      font-size: 20px;
      margin-bottom: 8px;
      letter-spacing: 8px;
      transition: color 0.4s;
    }
    body.light .deco { color: rgba(173, 20, 87, 0.45); }
    body.dark  .deco { color: rgba(244, 143, 177, 0.45); }

    /* ─── Theme Toggle Button ───────────────────────────────── */
    .theme-toggle {
      border-radius: 20px;
      padding: 5px 16px;
      font-family: 'Quicksand', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 12px;
      transition: all 0.2s;
      border: 1.5px solid rgba(255, 182, 193, 0.6);
    }
    body.light .theme-toggle {
      background: rgba(255, 255, 255, 0.6);
      color: #ad1457;
    }
    body.light .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.9);
    }
    body.dark .theme-toggle {
      background: rgba(60, 25, 50, 0.7);
      color: #f48fb1;
      border-color: rgba(244, 143, 177, 0.3);
    }
    body.dark .theme-toggle:hover {
      background: rgba(80, 35, 65, 0.9);
    }

    /* ─── Calculator Card ───────────────────────────────────── */
    .calc {
      border-radius: 28px;
      padding: 24px;
      width: 360px;
      max-width: min(100%, 420px);
      transition: background 0.4s, box-shadow 0.4s, border-color 0.4s, width 0.3s ease;
    }
    .calc.sci-open {
      width: 420px;
    }
    body.light .calc {
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 8px 32px rgba(236, 64, 122, 0.13),
        0 2px 8px rgba(186, 104, 200, 0.10);
      border: 1.5px solid rgba(255, 255, 255, 0.85);
    }
    body.dark .calc {
      background: rgba(40, 20, 40, 0.82);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow:
        0 8px 32px rgba(236, 64, 122, 0.25),
        0 2px 8px rgba(186, 104, 200, 0.15);
      border: 1.5px solid rgba(255, 100, 150, 0.18);
    }

    /* ─── Calc Title ────────────────────────────────────────── */
    .calc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .calc-title {
      font-size: 13px;
      font-weight: 600;
      text-align: left;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: color 0.4s;
      flex: 1;
    }
    .sci-toggle {
      min-width: 68px;
      padding: 8px 10px;
      font-size: 12px;
      letter-spacing: 1px;
      font-weight: 700;
      border-radius: 16px;
      border: 1.5px solid rgba(255, 182, 193, 0.6);
      background: rgba(255, 255, 255, 0.75);
      color: #ad1457;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.1s;
    }
    .sci-toggle:hover {
      background: rgba(255, 255, 255, 0.95);
      transform: translateY(-1px);
    }
    body.light .calc-title { color: rgba(173, 20, 87, 0.5); }
    body.dark  .calc-title { color: rgba(244, 143, 177, 0.5); }

    /* ─── Display Area ──────────────────────────────────────── */
    .display-wrap {
      border-radius: 18px;
      padding: 16px 20px 12px;
      margin-bottom: 18px;
      min-height: 96px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      position: relative;
      overflow: hidden;
      transition: background 0.4s, border-color 0.4s;
    }
    body.light .display-wrap {
      background: linear-gradient(135deg, #fce4ec, #f8bbd0);
      box-shadow: inset 0 2px 8px rgba(236, 64, 122, 0.09);
      border: 1px solid rgba(255, 182, 193, 0.5);
    }
    body.dark .display-wrap {
      background: linear-gradient(135deg, #3d1530, #4a1040);
      box-shadow: inset 0 2px 8px rgba(236, 64, 122, 0.15);
      border: 1px solid rgba(244, 143, 177, 0.2);
    }

    /* Small heart decoration in display */
    .display-wrap::before {
      content: '♡';
      position: absolute;
      top: 8px;
      left: 14px;
      font-size: 13px;
      transition: color 0.4s;
    }
    body.light .display-wrap::before { color: rgba(236, 64, 122, 0.25); }
    body.dark  .display-wrap::before { color: rgba(244, 143, 177, 0.20); }

    /* Expression line (shows the full expression being built) */
    .display-expr {
      font-size: 13px;
      min-height: 18px;
      word-break: break-all;
      text-align: right;
      width: 100%;
      font-weight: 500;
      transition: color 0.4s;
    }
    body.light .display-expr { color: rgba(173, 20, 87, 0.55); }
    body.dark  .display-expr { color: rgba(255, 150, 180, 0.55); }

    /* Main number display */
    .display-main {
      font-size: 38px;
      font-weight: 700;
      word-break: break-all;
      text-align: right;
      width: 100%;
      line-height: 1.1;
      transition: color 0.4s, transform 0.12s;
    }
    body.light .display-main { color: #ad1457; }
    body.dark  .display-main { color: #f48fb1; }

    /* Pop animation on equals */
    .display-main.pop {
      transform: scale(1.06);
    }

    /* Error state */
    .display-main.error {
      font-size: 22px !important;
      color: #ff5252 !important;
    }

    /* ─── Button Grid ───────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    /* ─── Scientific Grid (smaller buttons) ─────────────────── */
    .sci-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .sci-grid.hidden {
      display: none;
    }
    .btn-sci {
      height: 46px;
      font-size: 13px;
      border-radius: 10px;
      font-weight: 700;
    }

    /* ─── Base Button ───────────────────────────────────────── */
    .btn {
      border: none;
      outline: none;
      cursor: pointer;
      border-radius: 14px;
      font-family: 'Quicksand', sans-serif;
      font-size: 18px;
      font-weight: 600;
      height: 56px;
      position: relative;
      overflow: hidden;
      transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
    }
    .btn:hover {
      transform: translateY(-2px);
    }
    .btn:active {
      transform: scale(0.92);
    }

    /* Ripple effect overlay */
    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.25);
      opacity: 0;
      transition: opacity 0.15s;
      border-radius: inherit;
    }
    .btn:active::after { opacity: 1; }

    /* ─── Number Buttons ────────────────────────────────────── */
    .btn-num {
      transition: transform 0.1s, box-shadow 0.1s, background 0.15s;
    }
    body.light .btn-num {
      background: rgba(255, 255, 255, 0.88);
      color: #880e4f;
      box-shadow: 0 4px 10px rgba(200, 100, 150, 0.10);
    }
    body.light .btn-num:hover {
      background: rgba(252, 228, 236, 0.95);
      box-shadow: 0 6px 16px rgba(200, 100, 150, 0.18);
    }
    body.dark .btn-num {
      background: rgba(60, 25, 50, 0.85);
      color: #f8bbd0;
      box-shadow: 0 4px 10px rgba(236, 64, 122, 0.12);
    }
    body.dark .btn-num:hover {
      background: rgba(80, 35, 65, 0.95);
      box-shadow: 0 6px 16px rgba(236, 64, 122, 0.22);
    }

    /* ─── Operator Buttons ──────────────────────────────────── */
    .btn-op {
      background: linear-gradient(135deg, #f48fb1, #ce93d8);
      color: white;
      box-shadow: 0 4px 10px rgba(206, 147, 216, 0.30);
    }
    .btn-op:hover {
      background: linear-gradient(135deg, #f06292, #ba68c8);
      box-shadow: 0 6px 16px rgba(206, 147, 216, 0.40);
    }

    /* ─── Equals Button ─────────────────────────────────────── */
    .btn-eq {
      background: linear-gradient(135deg, #ec407a, #ab47bc);
      color: white;
      grid-column: span 2;  /* Takes up 2 columns */
      font-size: 22px;
      box-shadow: 0 4px 14px rgba(236, 64, 122, 0.35);
    }
    .btn-eq:hover {
      background: linear-gradient(135deg, #e91e63, #9c27b0);
      box-shadow: 0 6px 20px rgba(236, 64, 122, 0.45);
    }

    /* ─── Clear Button ──────────────────────────────────────── */
    .btn-clear {
      background: linear-gradient(135deg, #ffb3c6, #ff8fab);
      color: #880e4f;
      box-shadow: 0 4px 10px rgba(255, 143, 171, 0.30);
    }
    .btn-clear:hover {
      background: linear-gradient(135deg, #ff8fab, #ff6b9d);
      box-shadow: 0 6px 16px rgba(255, 143, 171, 0.40);
    }

    /* ─── Backspace Button ──────────────────────────────────── */
    .btn-back {
      box-shadow: 0 4px 10px rgba(200, 100, 150, 0.10);
    }
    body.light .btn-back {
      background: rgba(255, 224, 235, 0.9);
      color: #c2185b;
    }
    body.light .btn-back:hover {
      background: rgba(252, 228, 236, 0.98);
      box-shadow: 0 6px 16px rgba(200, 100, 150, 0.18);
    }
    body.dark .btn-back {
      background: rgba(80, 30, 55, 0.9);
      color: #f48fb1;
    }
    body.dark .btn-back:hover {
      background: rgba(100, 40, 70, 0.95);
      box-shadow: 0 6px 16px rgba(236, 64, 122, 0.22);
    }

    /* ─── Zero Button (spans 2 cols) ────────────────────────── */
    .btn-zero {
      grid-column: span 2;
      border-radius: 16px;
    }

    /* ─── Ripple Span (injected by JS) ──────────────────────── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.45);
      transform: scale(0);
      animation: ripple-anim 0.45s linear forwards;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* ─── Footer ────────────────────────────────────────────── */
    .footer {
      margin-top: 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      transition: color 0.4s;
    }
    body.light .footer { color: rgba(173, 20, 87, 0.35); }
    body.dark  .footer { color: rgba(244, 143, 177, 0.30); }

    /* ─── Responsive ────────────────────────────────────────── */
    @media (max-width: 360px) {
      .calc { width: 290px; padding: 18px; }
      .btn  { height: 54px; font-size: 16px; }
      .grid { gap: 8px; }
      .display-main { font-size: 32px; }
    }
  </style>
</head>
<body class="light">

  <div class="page-wrap">

    <!-- Decorative top symbols -->
    <div class="deco">♡ ✦ ♡</div>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="themeBtn">☽ dark mode</button>

    <!-- Calculator card -->
    <div class="calc">

      <div class="calc-header">
        <div class="calc-title">✿ Calculator ✿</div>
        <button class="sci-toggle" id="sciBtn">sci</button>
      </div>

      <!-- Display -->
      <div class="display-wrap">
        <div class="display-expr" id="expr"></div>
        <div class="display-main" id="main">0</div>
      </div>

      <!-- Scientific buttons (extra row) -->
      <div class="sci-grid hidden">
        <button class="btn btn-sci btn-back" data-key="(">(</button>
        <button class="btn btn-sci btn-back" data-key=")">)</button>
        <button class="btn btn-sci btn-back" data-key="π">π</button>
        <button class="btn btn-sci btn-back" data-key="E">e</button>
        <button class="btn btn-sci btn-op"   data-key="^">^</button>

        <button class="btn btn-sci btn-op" data-key="sin">sin</button>
        <button class="btn btn-sci btn-op" data-key="cos">cos</button>
        <button class="btn btn-sci btn-op" data-key="tan">tan</button>
        <button class="btn btn-sci btn-op" data-key="ln">ln</button>
        <button class="btn btn-sci btn-op" data-key="log">log</button>

        <button class="btn btn-sci btn-op" data-key="sqrt">√</button>
        <button class="btn btn-sci btn-op" data-key="^2">x²</button>
        <button class="btn btn-sci btn-op" data-key="!">x!</button>
        <button class="btn btn-sci btn-op" data-key="exp">exp</button>
        <button class="btn btn-sci btn-op" data-key="abs">abs</button>
      </div>

      <!--
        Button Grid Layout:
        [ C  ] [ ⌫ ] [ % ] [ ÷ ]
        [ 7  ] [ 8 ] [ 9 ] [ × ]
        [ 4  ] [ 5 ] [ 6 ] [ − ]
        [ 1  ] [ 2 ] [ 3 ] [ + ]
        [  0       ] [ . ] [ = ]
      -->
      <div class="grid">
        <!-- Row 1: utility + divide -->
        <button class="btn btn-clear" data-key="C">C</button>
        <button class="btn btn-back"  data-key="⌫">⌫</button>
        <button class="btn btn-op"    data-key="%">%</button>
        <button class="btn btn-op"    data-key="÷">÷</button>

        <!-- Row 2 -->
        <button class="btn btn-num" data-key="1">1</button>
        <button class="btn btn-num" data-key="2">2</button>
        <button class="btn btn-num" data-key="3">3</button>
        <button class="btn btn-op"  data-key="+">+</button>

        <!-- Row 3 -->
        <button class="btn btn-num" data-key="4">4</button>
        <button class="btn btn-num" data-key="5">5</button>
        <button class="btn btn-num" data-key="6">6</button>
        <button class="btn btn-op"  data-key="−">−</button>

        <!-- Row 4 -->
        <button class="btn btn-num" data-key="7">7</button>
        <button class="btn btn-num" data-key="8">8</button>
        <button class="btn btn-num" data-key="9">9</button>
        <button class="btn btn-op"  data-key="×">×</button>

        <!-- Row 5: zero (wide) + decimal + equals (wide) -->
        <button class="btn btn-num btn-zero" data-key="0">0</button>
        <button class="btn btn-num"          data-key=".">.</button>
        <button class="btn btn-eq"           data-key="=">=</button>
      </div>

    </div><!-- /.calc -->

    <div class="footer">made with ♡</div>

  </div><!-- /.page-wrap -->

  <script>
    // ─── State ────────────────────────────────────────────────
    let current   = '0';   // number currently being entered
    let expr      = '';    // expression string shown in small text
    let justCalc  = false; // true right after = is pressed
    let hasError  = false; // true when an error is displayed

    // ─── DOM refs ─────────────────────────────────────────────
    const mainEl  = document.getElementById('main');
    const exprEl  = document.getElementById('expr');
    const themeBtn = document.getElementById('themeBtn');
    const sciBtn   = document.getElementById('sciBtn');
    const sciGrid  = document.querySelector('.sci-grid');

    // ─── Update Display ───────────────────────────────────────
    function updateDisplay() {
      mainEl.textContent = current;
      exprEl.textContent = expr;
      mainEl.classList.toggle('error', hasError);
    }

    // ─── Pop Animation on equals ──────────────────────────────
    function popAnim() {
      mainEl.classList.remove('pop');
      void mainEl.offsetWidth; // force reflow to restart animation
      mainEl.classList.add('pop');
      setTimeout(() => mainEl.classList.remove('pop'), 150);
    }

    // ─── Core Key Handler ─────────────────────────────────────
    function press(key, event) {

      // Add ripple to clicked button
      if (event) addRipple(event);

      // Block all input when in error state (except clear)
      if (hasError && key !== 'C') return;

      // ── Clear ──
      if (key === 'C') {
        current  = '0';
        expr     = '';
        justCalc = false;
        hasError = false;
        updateDisplay();
        return;
      }

      // ── Backspace ──
      if (key === '⌫') {
        if (justCalc) {
          current  = '0';
          expr     = '';
          justCalc = false;
        } else if (current.length > 1) {
          current = current.slice(0, -1);
        } else {
          current = '0';
        }
        updateDisplay();
        return;
      }

      // ── Parentheses ──
      if (key === '(' || key === ')') {
        justCalc = false;
        if (justCalc) { expr = ''; current = ''; }
        if (key === '(') {
          if (current && current !== '0') { expr += current; current = ''; }
          expr += '(';
        } else {
          if (current && current !== '0') { expr += current; current = ''; }
          expr += ')';
        }
        updateDisplay();
        return;
      }

      // ── Functions (sin, cos, tan, ln, log, sqrt, exp, abs) ──
      const funcs = ['sin','cos','tan','ln','log','sqrt','exp','abs'];
      if (funcs.includes(key)) {
        justCalc = false;
        if (current && current !== '0') {
          current = key + '(' + current + ')';
        } else {
          expr += key + '(';
        }
        updateDisplay();
        return;
      }

      // ── Constants (π, e) ──
      if (key === 'π' || key === 'E') {
        if (justCalc) { current = '0'; expr = ''; justCalc = false; }
        if (current === '0' || !current) current = key;
        else current += key;
        updateDisplay();
        return;
      }

      // ── Factorial ──
      if (key === '!') {
        if (current && current !== '0' && !current.endsWith('!')) {
          current = current + '!';
          updateDisplay();
        }
        return;
      }

      // ── Operator (+, −, ×, ÷, ^) ──
      if (['+', '−', '×', '÷', '^'].includes(key)) {
        justCalc = false;
        if (expr && current) {
          expr = expr + current + ' ' + key + ' ';
        } else {
          expr = (expr || current) + ' ' + key + ' ';
        }
        current = '';
        updateDisplay();
        return;
      }

      // ── Percent (keep existing behaviour) ──
      if (key === '%') {
        const v = parseFloat(current);
        if (!isNaN(v)) current = String(v / 100);
        updateDisplay();
        return;
      }

      // ── Equals ──
      if (key === '=') {
        if (!expr && !current) return;

        const fullExpr = expr + current;
        exprEl.textContent = fullExpr + ' =';

        try {
          // Provide Math.log10 fallback
          if (!Math.log10) Math.log10 = x => Math.log(x) / Math.LN10;

          // Replace display tokens with JS equivalents
          let sanitized = fullExpr
            .replace(/÷/g, '/')
            .replace(/×/g, '*')
            .replace(/−/g, '-')
            .replace(/π/g, 'Math.PI')
            .replace(/\bE\b/g, 'Math.E')
            .replace(/sin\(/g, 'Math.sin(')
            .replace(/cos\(/g, 'Math.cos(')
            .replace(/tan\(/g, 'Math.tan(')
            .replace(/ln\(/g, 'Math.log(')
            .replace(/log\(/g, 'Math.log10(')
            .replace(/sqrt\(/g, 'Math.sqrt(')
            .replace(/exp\(/g, 'Math.exp(')
            .replace(/abs\(/g, 'Math.abs(')
            .replace(/\^/g, '**');

          // Replace factorial patterns like 5! or (expr)! with fact(...)
          sanitized = sanitized.replace(/(\d+)!/g, 'fact($1)');
          sanitized = sanitized.replace(/(\([^)]*\))!/g, 'fact($1)');

          // Check explicitly for division by zero
          if (/\/\s*0($|[^.0-9])/.test(sanitized)) {
            throw new Error('div0');
          }

          // Provide factorial helper in scope
          function fact(n) {
            n = Number(n);
            if (!Number.isFinite(n) || n < 0 || Math.floor(n) !== n) throw new Error('fact');
            let r = 1;
            for (let i = 2; i <= n; i++) r *= i;
            return r;
          }

          // Evaluate safely using Function constructor (no eval)
          let result = Function('fact', '"use strict"; return (' + sanitized + ')')(fact);

          if (!isFinite(result) || isNaN(result)) throw new Error('inf');
          result = parseFloat(result.toPrecision(12));
          current = String(result);
        } catch (e) {
          if (e.message === 'div0') {
            current = 'no ÷ by 0! ♡';
          } else if (e.message === 'fact') {
            current = 'bad ! ♡';
          } else {
            current = 'error ♡';
          }
          hasError = true;
        }

        expr     = '';
        justCalc = true;
        popAnim();
        updateDisplay();
        return;
      }

      // ── Decimal point ──
      if (key === '.') {
        if (justCalc) { current = '0'; justCalc = false; }
        if (!current && expr) current = '0';
        if (current.includes('.')) return;
        current += '.';
        updateDisplay();
        return;
      }

      // ── x² quick button ──
      if (key === '^2') {
        if (current && current !== '0') {
          current = current + '^2';
          updateDisplay();
        }
        return;
      }

      // ── Digit (0-9) ──
      if (justCalc) {
        current  = '';
        expr     = '';
        justCalc = false;
      }
      if (current === '0') {
        current = key;
      } else {
        current += key;
      }
      if (current.length > 24) current = current.slice(0, 24);
      updateDisplay();
    }

    // ─── Ripple Effect ────────────────────────────────────────
    function addRipple(event) {
      const btn  = event.currentTarget;
      const rect = btn.getBoundingClientRect();
      const size = Math.max(btn.offsetWidth, btn.offsetHeight);

      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.width  = size + 'px';
      ripple.style.height = size + 'px';
      ripple.style.left   = (event.clientX - rect.left - size / 2) + 'px';
      ripple.style.top    = (event.clientY - rect.top  - size / 2) + 'px';

      btn.appendChild(ripple);
      setTimeout(() => ripple.remove(), 500);
    }

    // ─── Attach Click Listeners to All Buttons ────────────────
    document.querySelectorAll('.btn[data-key]').forEach(btn => {
      btn.addEventListener('click', e => press(btn.dataset.key, e));
    });

    // ─── Keyboard Support ─────────────────────────────────────
    const keyMap = {
      'Enter'     : '=',
      'Backspace' : '⌫',
      'Escape'    : 'C',
      '+'         : '+',
      '-'         : '−',
      '*'         : '×',
      '/'         : '÷',
      '^'         : '^',
      '('         : '(',
      ')'         : ')',
      '%'         : '%',
    };

    document.addEventListener('keydown', e => {
      if (e.metaKey || e.ctrlKey) return; // don't hijack browser shortcuts
      if (keyMap[e.key]) {
        e.preventDefault();
        press(keyMap[e.key]);
      } else if (/^[0-9.]$/.test(e.key)) {
        press(e.key);
      }
    });

    // ─── Dark / Light Mode Toggle ─────────────────────────────
    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark');
      document.body.classList.toggle('light', !isDark);
      themeBtn.textContent = isDark ? '☀ light mode' : '☽ dark mode';
    }
    themeBtn.addEventListener('click', toggleTheme);

    // ─── Scientific Button Toggle ─────────────────────────────
    function toggleSciPanel() {
      const isOpen = sciGrid.classList.toggle('visible');
      sciGrid.classList.toggle('hidden', !isOpen);
      document.querySelector('.calc').classList.toggle('sci-open', isOpen);
      sciBtn.textContent = isOpen ? 'sci ▾' : 'sci';
    }
    sciBtn.addEventListener('click', toggleSciPanel);

    // ─── Init Display ─────────────────────────────────────────
    updateDisplay();
  </script>

</body>
</html>
